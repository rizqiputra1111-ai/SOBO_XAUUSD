            height: 320px;

        }

            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed #222531;
            padding-bottom: 6px;
            margin-bottom: 12px;
            font-size: 0.75rem;
            color: #d4af37;
        }
    </style>
</head>
