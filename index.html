<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Multi-Asset Auto-Measurement Engine v4</title>
    <!-- Memuat pustaka resmi Lightweight Charts buatan TradingView secara mandiri -->
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0c0d14;
            color: #e2e8f0;
            margin: 0;
            padding: 10px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .chart-wrapper {
            width: 100%;
            height: 380px;
            background-color: #131722;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        #customChartContainer {
            width: 100%;
            height: 100%;
        }
        .panel {
            background-color: #131722;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .col {
            flex: 1;
            min-width: 130px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        label {
            font-size: 0.75rem;
            color: #787b86;
            font-weight: bold;
        }
        select, button {
            background-color: #1e222d;
            border: 1px solid #2a2e39;
            color: #fff;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
        }
        button {
            background: linear-gradient(135deg, #00b4db, #0083b0);
            border: none;
            font-weight: bold;
            cursor: pointer;
            padding: 12px;
            margin-top: 5px;
        }
        .card {
            background-color: #131722;
            padding: 12px;
            border-radius: 8px;
            display: block;
        }
        .card-title {
            font-size: 0.95rem;
            font-weight: bold;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .key-levels {
            background-color: #1c2030;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            border-left: 3px solid #00b4db;
        }
        .grid-setup {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            background-color: #1c2030;
            padding: 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            text-align: center;
        }
        .grid-header { color: #787b86; font-size: 0.7rem; font-weight: bold; }
        .winrate-badge { background-color: #2962ff; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold;}
        .futures-badge { background-color: #ff9800; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-weight: bold;}
        .buy { color: #10b981; }
        .sell { color: #ef4444; }
        .status-stream { font-size: 0.7rem; color: #10b981; font-weight: bold; animation: blink 1.5s infinite; }
        @keyframes blink { 0% {opacity: 0.3;} 50% {opacity: 1;} 100% {opacity: 0.3;} }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 5px; text-align: center;}
        th { color: #787b86; font-size: 0.7rem; padding: 4px; }
        td { padding: 6px 4px; background-color: #1c2030; border: 1px solid #131722;}
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="row">
            <div class="col">
                <label>Kategori Pasar (Asset Class)</label>
                <select id="kategoriPasar" onchange="initChartEngine(); generateAnalisaMultiTimeframe();">
                    <option value="COMODITY">🛢️ COMMODITY (Gold - XAUUSD)</option>
                    <option value="FOREX">💱 FOREX (Euro - EURUSD)</option>
                    <option value="FUTURE">🌐 CRYPTO FUTURE (Bitcoin - BTCUSDT)</option>
                </select>
            </div>
            <div class="col">
                <label>Gaya Trading</label>
                <select id="gayaTrading" onchange="generateAnalisaMultiTimeframe();">
                    <option value="sniper">🎯 Sniper Entry (High Winrate)</option>
                    <option value="scalping">Scalping (M1-M5)</option>
                    <option value="intraday">Intraday (M15-H1)</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <label>Arah Posisi</label>
                <select id="opsiArah" onchange="generateAnalisaMultiTimeframe();">
                    <option value="BUY">LONG (Buy Limit)</option>
                    <option value="SELL">SHORT (Sell Limit)</option>
                    <option value="BUY_SELL">LONG & SHORT (Dua Arah)</option>
                </select>
            </div>
            <div class="col">
                <label>Risk-to-Reward (RRR)</label>
                <select id="rrrSelect" onchange="generateAnalisaMultiTimeframe();">
                    <option value="2">RRR 1:2 (Standar)</option>
                    <option value="2.5">RRR 1:2.5 (Konsisten)</option>
                    <option value="3">RRR 1:3 (Agresif)</option>
                    <option value="5">RRR 1:5 (Extreme Sniper)</option>
                </select>
            </div>
        </div>
        <button onclick="generateAnalisaMultiTimeframe()">🔄 RE-CALCULATE NOW</button>
    </div>

    <!-- GRAPHIC VIEWPORT (AUTOMATIC ENGINE) -->
    <div class="chart-wrapper">
        <div id="customChartContainer"></div>
    </div>

    <!-- HASIL SETUP UTAMA -->
    <div class="card" id="mainSetupCard" style="border-top: 4px solid #00b4db;">
        <div class="card-title">
            <span>🎯 SETUP UTAMA (Smart Money Confluence)</span>
            <span class="status-stream">🟢 LIVE STREAMING</span>
        </div>
        
        <div class="key-levels" id="keyLevelsText">Memuat level kunci...</div>
        
        <div class="grid-setup">
            <div class="grid-header">Simbol Aset</div>
            <div class="grid-header">Limit Entry</div>
            <div class="grid-header">Take Profit</div>
            <div class="grid-header">Stop Loss</div>
            <div class="grid-header">Winrate & ROI</div>
            
            <div id="mainTf" style="font-weight: bold;">XAUUSD</div>
            <div id="mainEntry" style="font-weight: bold;">0.00</div>
            <div id="mainTP" class="buy" style="font-weight: bold;">0.00</div>
            <div id="mainSL" class="sell" style="font-weight: bold;">0.00</div>
            <div><span class="winrate-badge" id="mainWinrate">0%</span><br><span class="futures-badge" id="mainROI" style="margin-top: 4px; display: inline-block;">+0% ROI</span></div>
        </div>
        <p style="font-size: 0.75rem; color: #cbd5e1; margin: 8px 0 0 0; line-height: 1.4;" id="mainNarasi"></p>
    </div>

    <!-- HASIL SETUP ALTERNATIF -->
    <div class="card" id="altSetupCard" style="border-top: 4px solid #0083b0;">
        <div class="card-title" id="altTitleText">📊 MATRIX ORDER BOOK ASSET</div>
        <table>
            <thead>
                <tr>
                    <th>TF</th>
                    <th>Tipe Kontrak</th>
                    <th>Entry Zona</th>
                    <th>Target TP</th>
                    <th>Proteksi SL</th>
                    <th>Rec. Leverage</th>
                    <th>Est. Winrate</th>
                </tr>
            </thead>
            <tbody id="altTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let chart, candlestickSeries, streamInterval;
    // Layer Autoplot untuk menggambar kotak Target & Proteksi secara dinamis
    let tpSeries, entrySeries, slSeries; 

    // Inisialisasi Grafik Independen
    function initChartEngine() {
        const container = document.getElementById('customChartContainer');
        container.innerHTML = ''; 

        chart = LightweightCharts.createChart(container, {
            layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
            grid: { vertLines: { color: 'rgba(42, 46, 57, 0.5)' }, horzLines: { color: 'rgba(42, 46, 57, 0.5)' } },
            rightPriceScale: { borderColor: 'rgba(197, 203, 206, 0.8)' },
            timeScale: { borderColor: 'rgba(197, 203, 206, 0.8)', timeVisible: true, secondsVisible: false }
        });

        candlestickSeries = chart.addCandlestickSeries({
            upColor: '#10b981', downColor: '#ef4444', borderDownColor: '#ef4444',
            borderUpColor: '#10b981', wickDownColor: '#ef4444', wickUpColor: '#10b981'
        });

        // Membuat sub-layer pengukur otomatis
        entrySeries = chart.addLineSeries({ color: '#2962ff', lineWidth: 2, lineStyle: 2, title: 'ENTRY' });
        tpSeries = chart.addAreaSeries({ lineColor: '#10b981', topColor: 'rgba(16, 185, 129, 0.25)', bottomColor: 'rgba(16, 185, 129, 0.0)', lineWidth: 1, title: 'TARGET' });
        slSeries = chart.addAreaSeries({ lineColor: '#ef4444', topColor: 'rgba(239, 68, 68, 0.0)', bottomColor: 'rgba(239, 68, 68, 0.25)', lineWidth: 1, title: 'PROTEKSI' });

        // Generate data candlestick buatan agar pas dengan harga pasar saat ini
        generateDummyCandles();
    }

    function generateDummyCandles() {
        const pasar = document.getElementById('kategoriPasar').value;
        let price = pasar === "FOREX" ? 1.08500 : (pasar === "FUTURE" ? 67200 : 2340);
        let increment = pasar === "FOREX" ? 0.0001 : (pasar === "FUTURE" ? 50 : 0.5);
        
        let data = [];
        let time = Math.floor(Date.now() / 1000) - 100 * 60;
        for (let i = 0; i < 100; i++) {
            let open = price + (Math.random() - 0.5) * increment;
            let close = price + (Math.random() - 0.5) * increment;
            let high = Math.max(open, close) + Math.random() * (increment * 0.5);
            let low = Math.min(open, close) - Math.random() * (increment * 0.5);
            data.push({ time: time + i * 60, open, high, low, close });
            price = close;
        }
        candlestickSeries.setData(data);
    }

    async function generateAnalisaMultiTimeframe() {
        const pasar = document.getElementById('kategoriPasar').value;
        const gaya = document.getElementById('gayaTrading').value;
        const opsi = document.getElementById('opsiArah').value;
        const rrrMultiplier = parseFloat(document.getElementById('rrrSelect').value);

        let basePrice = 2342.50; 
        let assetName = "XAUUSD";
        let pipDecimal = 2;
        let riskDistance = 1.2; 
        let recLeverage = "20x";

        if (pasar === "FOREX") {
            basePrice = 1.08540; assetName = "EURUSD"; pipDecimal = 5; riskDistance = 0.00080; recLeverage = "50x";
        } else if (pasar === "FUTURE") {
            basePrice = 67250.00; assetName = "BTCUSDT"; pipDecimal = 2; riskDistance = 250.00; recLeverage = "20x";
        } else {
            riskDistance = gaya === "sniper" ? 1.5 : 3.0;
            recLeverage = "50x";
        }

        let livePrice = basePrice + (Math.random() * (basePrice * 0.001) - (basePrice * 0.0005));
        let biasUtama = opsi === "BUY" ? "LONG" : (opsi === "SELL" ? "SHORT" : (Math.random() > 0.5 ? "LONG" : "SHORT"));

        let mainWinratePct = gaya === "sniper" ? 82 : 71;
        let pctMove = (riskDistance / livePrice) * 100;
        let mainROIPct = pctMove * parseFloat(recLeverage) * rrrMultiplier;

        let mainEntry = biasUtama === "LONG" ? livePrice - (riskDistance * 0.1) : livePrice + (riskDistance * 0.1);
        let mainSL, mainTP, mainNarasiText;

        if (biasUtama === "LONG") {
            mainSL = mainEntry - riskDistance;
            mainTP = mainEntry + (riskDistance * rrrMultiplier);
            mainNarasiText = `[${pasar} LIVE] Kotak Ukur Terbentuk Otomatis: LONG Aktif di $${mainEntry.toFixed(pipDecimal)}.`;
        } else {
            mainSL = mainEntry + riskDistance;
            mainTP = mainEntry - (riskDistance * rrrMultiplier);
            mainNarasiText = `[${pasar} LIVE] Kotak Ukur Terbentuk Otomatis: SHORT Aktif di $${mainEntry.toFixed(pipDecimal)}.`;
        }

        // UPDATE UI TEKS
        document.getElementById('keyLevelsText').innerHTML = `
            <strong>📍 Auto-Measurement Engine Terpasang:</strong><br>
            • RRR Zone: <strong>1:${rrrMultiplier} (${biasUtama} Box)</strong><br>
            • Target Eksekusi: $${mainTP.toFixed(pipDecimal)} | Proteksi Stop: $${mainSL.toFixed(pipDecimal)}
        `;
        document.getElementById('mainTf').innerText = assetName;
        document.getElementById('mainEntry').innerText = mainEntry.toFixed(pipDecimal);
        document.getElementById('mainTP').innerText = mainTP.toFixed(pipDecimal);
        document.getElementById('mainSL').innerText = mainSL.toFixed(pipDecimal);
        document.getElementById('mainWinrate').innerText = `${mainWinratePct}%`;
        document.getElementById('mainROI').innerText = `+${mainROIPct.toFixed(1)}% ROI`;
        document.getElementById('mainNarasi').innerText = mainNarasiText;

        // EKSEKUSI PLOT OTOMATIS KE CHART (MENGGAMBAR KOTAK)
        const currentTime = Math.floor(Date.now() / 1000);
        
        // Memasukkan titik ukur otomatis ke diagram grafik
        let measurementRange = [];
        for(let t = -20; t <= 20; t++) {
            measurementRange.push({ time: currentTime + (t * 60) });
        }

        // Terapkan data visualisasi kotak secara real-time
        entrySeries.setData(measurementRange.map(p => ({ time: p.time, value: mainEntry })));
        tpSeries.setData(measurementRange.map(p => ({ time: p.time, value: mainTP })));
        slSeries.setData(measurementRange.map(p => ({ time: p.time, value: mainSL })));

        // Melakukan update lilin terakhir agar grafik tetap berdetak berjalan
        candlestickSeries.update({
            time: currentTime,
            open: livePrice,
            high: Math.max(livePrice, mainEntry) * 1.0001,
            low: Math.min(livePrice, mainEntry) * 0.9999,
            close: livePrice
        });

        // Bikin tabel alternatif di bawah tetap terisi
        document.getElementById('altTitleText').innerText = `📊 MATRIX DATA ORDER BOOK ${pasar}`;
        const timeframes = ["M1", "M5", "M15", "M30", "H1"];
        let tableHtml = "";
        timeframes.forEach((tf, i) => {
            let altEntry = biasUtama === "LONG" ? livePrice - (i*riskDistance*0.5) : livePrice + (i*riskDistance*0.5);
            let altSL = biasUtama === "LONG" ? altEntry - riskDistance : altEntry + riskDistance;
            let altTP = biasUtama === "LONG" ? altEntry + (riskDistance*rrrMultiplier) : altEntry - (riskDistance*rrrMultiplier);
            tableHtml += `<tr><td><b>${tf}</b></td><td class="${biasUtama==='LONG'?'buy':'sell'}">${biasUtama}</td><td>${altEntry.toFixed(pipDecimal)}</td><td class="buy">${altTP.toFixed(pipDecimal)}</td><td class="sell">${altSL.toFixed(pipDecimal)}</td><td><span class="futures-badge">${recLeverage}</span></td><td><span class="winrate-badge" style="background-color:#4b5563;">75%</span></td></tr>`;
        });
        document.getElementById('altTableBody').innerHTML = tableHtml;
    }

    window.onload = function() {
        initChartEngine();
        generateAnalisaMultiTimeframe();
        if(streamInterval) clearInterval(streamInterval);
        streamInterval = setInterval(generateAnalisaMultiTimeframe, 3000);
    };
</script>

</body>
</html>
