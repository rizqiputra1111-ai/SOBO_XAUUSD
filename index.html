            margin: 0;
            padding: 12px;

        .container {

            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .panel {
            background-color: #131722;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #2a2e39;
        }
        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .col {

            display: flex;
            flex-direction: column;
            gap: 4px;
        }

            font-size: 0.75rem;
            color: #787b86;
            font-weight: bold;
            text-transform: uppercase;
        }

            border: 1px solid #2a2e39;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
        }

            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;

            padding-bottom: 8px;
            margin-bottom: 14px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #d4af37;
        }
        .output-text {

            white-space: pre-wrap;
            font-size: 0.82rem;
            color: #e2e8f0;
            line-height: 1.5;
        }
    </style>
</head>

    </div>
</div>
