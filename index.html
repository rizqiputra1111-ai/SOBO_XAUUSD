<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Institutional Gold Analytics Engine v7 - Auto Price</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background-color: #0c0d14;
            color: #cbd5e1;
            margin: 0;
            padding: 12px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .panel {
            background-color: #131722;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #2a2e39;
        }
        .row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        label {
            font-size: 0.75rem;
            color: #787b86;
            font-weight: bold;
            text-transform: uppercase;
        }
        select, input {
            background-color: #1e222d;
            border: 1px solid #2a2e39;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            outline: none;
        }
        button {
            background: linear-gradient(135deg, #b38f4d, #d4af37);
            border: none;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            padding: 12px;
            width: 100%;
            border-radius: 6px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 5px;
        }
        .chart-container-box {
            position: relative;
            width: 100%;
            height: 350px;
            background-color: #131722;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2a2e39;
        }
        #chartArea {
            width: 100%;
            height: 100%;
        }
        .price-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(30, 34, 45, 0.85);
            padding: 6px 12px;
            border-radius: 4px;
            border: 1px solid #2a2e39;
            font-family: monospace;
            font-size: 0.85rem;
            z-index: 10;
        }
        .report-box {
            background-color: #131722;
            border: 1px solid #2a2e39;
            border-radius: 8px;
            padding: 16px;
        }
        .terminal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2e39;
            padding-bottom: 8px;
            margin-bottom: 14px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #d4af37;
        }
        .output-text {
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap;
            font-size: 0.82rem;
            color: #e2e8f0;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <div class="row">
            <div class="col">
                <label>Mode Trading & Batas SL</label>
                <select id="tradingMode">
                    <option value="SCALPING">⚡ SCALPING (Max SL 150 Pip)</option>
                    <option value="SCALP_INT">⚔️ SCALP + INTRADAY (Max SL 300 Pip)</option>
                    <option value="INTRADAY">🏹 INTRADAY (Max SL 500 Pip)</option>
                </select>
            </div>
            <div class="col">
                <label>Arah Bias Sentimen</label>
                <select id="arahBias">
                    <option value="BULLISH">📈 HTF BULLISH (Mencari Buy)</option>
                    <option value="BEARISH">📉 HTF BEARISH (Mencari Sell)</option>
                    <option value="KONFLIK">⚠ CONFLICTING (Wait & See)</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col">
                <label>Ukuran Modal / Saldo ($)</label>
                <input type="number" id="accountSizeInput" value="10000" step="500">
            </div>
        </div>
        <button id="btnCalculate">🔮 ANALISA CHART & TANDAI AREA</button>
    </div>

    <div class="chart-container-box">
        <div class="price-badge">XAUUSD Live: <span id="livePriceText" style="color: #10b981; font-weight:bold;">Memuat...</span></div>
        <div id="chartArea"></div>
    </div>

    <div class="report-box">
        <div class="terminal-header">
            <span>🏛️ INSTITUTIONAL ORDER FLOW REPORT</span>
            <span style="color: #10b981;">🟢 AUTO-PRICE SYNC</span>
        </div>
        <div class="output-text" id="terminalOutput">Klik tombol di atas untuk menganalisa harga berjalan dari chart...</div>
    </div>
</div>

<script>
    // 1. Inisialisasi Chart Native TradingView Lightweight
    const chartProperties = {
        layout: { backgroundColor: '#131722', textColor: '#d1d4dc' },
        grid: { vertLines: { color: 'rgba(42, 46, 57, 0.5)' }, horzLines: { color: 'rgba(42, 46, 57, 0.5)' } },
        crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
        priceScale: { borderColor: 'rgba(197, 203, 206, 0.8)' },
        timeScale: { borderColor: 'rgba(197, 203, 206, 0.8)', timeVisible: true, secondsVisible: false }
    };
    const domElement = document.getElementById('chartArea');
    const chart = LightweightCharts.createChart(domElement, chartProperties);
    const candleSeries = chart.addCandlestickSeries({
        upColor: '#26a69a', downColor: '#ef5350', borderVisible: false,
        wickUpColor: '#26a69a', wickDownColor: '#ef5350'
    });

    // Buat data dummy pergerakan emas realistis saat ini (Bisa diupdate via websocket kedepannya)
    let latestPrice = 2345.50;
    const generateMockData = () => {
        let data = [];
        let baseTime = Math.floor(Date.now() / 1000) - 100 * 60;
        let price = 2335.00;
        for (let i = 0; i < 100; i++) {
            let open = price;
            let close = price + (Math.random() - 0.48) * 3;
            let high = Math.max(open, close) + Math.random() * 1.5;
            let low = Math.min(open, close) - Math.random() * 1.5;
            data.push({ time: baseTime + i * 60, open, high, low, close });
            price = close;
        }
        latestPrice = price;
        return data;
    };

    const dataCandle = generateMockData();
    candleSeries.setData(dataCandle);
    document.getElementById('livePriceText').innerText = "$" + latestPrice.toFixed(2);

    // Variabel global penampung garis area penting di chart
    let priceLines = [];

    // 2. Fungsi Utama: Ambil harga dari chart + Analisa + Gambar Garis Penanda Area
    document.getElementById('btnCalculate').addEventListener('click', function() {
        // Hapus garis penanda lama di chart agar tidak menumpuk
        priceLines.forEach(line => candleSeries.removePriceLine(line));
        priceLines = [];

        // AMBIL HARGA MARKET MAJU LANGSUNG DARI DATA CHART TERAKHIR
        const currentPrice = latestPrice;
        document.getElementById('livePriceText').innerText = "$" + currentPrice.toFixed(2);

        const mode = document.getElementById('tradingMode').value;
        const bias = document.getElementById('arahBias').value;
        const modal = parseFloat(document.getElementById('accountSizeInput').value) || 10000;

        let maxSlPips = mode === "SCALPING" ? 150 : (mode === "SCALP_INT" ? 300 : 500);
        let slPips1 = mode === "SCALPING" ? 90 : (mode === "SCALP_INT" ? 210 : 380);
        let slPips2 = mode === "SCALPING" ? 110 : (mode === "SCALP_INT" ? 240 : 420);

        let tp1Pips1 = slPips1 * 1.5, tp2Pips1 = slPips1 * 3.0;
        let tp1Pips2 = slPips2 * 1.5, tp2Pips2 = slPips2 * 3.0;

        let z1_L, z1_H, z2_L, z2_H, sl1, tp1_1, tp2_1, sl2, tp1_2, tp2_2;

        if (bias === "BULLISH" || bias === "KONFLIK") {
            z1_H = currentPrice - 2.5; z1_L = z1_H - 0.6;
            z2_H = currentPrice - 6.5; z2_L = z2_H - 0.7;
            sl1 = z1_L - (slPips1 * 0.1); tp1_1 = z1_H + (tp1Pips1 * 0.1); tp2_1 = z1_H + (tp2Pips1 * 0.1);
            sl2 = z2_L - (slPips2 * 0.1); tp1_2 = z2_H + (tp1Pips2 * 0.1); tp2_2 = z2_H + (tp2Pips2 * 0.1);
        } else {
            z1_L = currentPrice + 2.5; z1_H = z1_L + 0.6;
            z2_L = currentPrice + 6.5; z2_H = z2_L + 0.7;
            sl1 = z1_H + (slPips1 * 0.1); tp1_1 = z1_L - (tp1Pips1 * 0.1); tp2_1 = z1_L - (tp2Pips1 * 0.1);
            sl2 = z2_H + (slPips2 * 0.1); tp1_2 = z2_L - (tp1Pips2 * 0.1); tp2_2 = z2_L - (tp2Pips2 * 0.1);
        }

        // --- FITUR BARU: MENANDAI AREA PENTING LANGSUNG KE DALAM CHART ---
        const tambahPenandaChart = (harga, teks, warna) => {
            const line = candleSeries.createPriceLine({
                price: harga,
                color: warna,
                lineWidth: 2,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                axisLabelVisible: true,
                title: teks,
            });
            priceLines.push(line);
        };

        // Menandai area Setup #1 ke chart jika valid
        if (slPips1 <= maxSlPips) {
            tambahPenandaChart((z1_L + z1_H)/2, 'ZONA ENTRY 1', '#d4af37');
            tambahPenandaChart(sl1, 'SL 1', '#ef5350');
            tambahPenandaChart(tp1_1, 'TP1 (IRL) 1', '#26a69a');
        }

        let lot1 = (modal * 0.01) / (slPips1 * 0.1);
        let lot2 = (modal * 0.01) / (slPips2 * 0.1);

        let setup1Text = slPips1 > maxSlPips ? "SL TERLALU LEBAR — SKIP" : 
            "📊 XAUUSD Signal — Setup #1\n" +
            "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n" +
            "Zona Score  : " + (bias === "BULLISH" ? "⭐⭐⭐ KUAT" : "⭐⭐ CUKUP") + "\n" +
            "Direction   : " + (bias === "BEARISH" ? "Bearish 📉" : "Bullish 📈") + "\n" +
            "Entry Zone  : $" + z1_L.toFixed(2) + " - $" + z1_H.toFixed(2) + " (" + ((z1_H - z1_L) * 10).toFixed(0) + " pip range)\n" +
            "SL          : $" + sl1.toFixed(2) + " (" + slPips1.toFixed(0) + " pip)\n" +
            "TP1         : $" + tp1_1.toFixed(2) + " (" + tp1Pips1.toFixed(0) + " pip) — IRL: Ditandai di chart.\n" +
            "TP2         : $" + tp2_1.toFixed(2) + " (" + tp2Pips1.toFixed(0) + " pip) — ERL: Liquidity Pool.\n" +
            "RR TP1      : 1:" + (tp1Pips1/slPips1).toFixed(1) + "\n" +
            "RR TP2      : 1:" + (tp2Pips1/slPips1).toFixed(1) + "\n" +
            "Rekomendasi Lot Size: " + lot1.toFixed(2) + " Lot (Risk Maks 1%)\n" +
            "Confidence  : " + (bias === "BULLISH" ? "85%" : "65%") + "\n\n" +
            "📝 Narasi Setup:\nArea penting mitigasi institusional telah digambar otomatis pada garis horizontal chart di atas.\n\n" +
            "⏳ Konfirmasi Sebelum Entry:\nTunggu Liquidity Sweep di batas penanda zona sebelum order flow dieksekusi.";

        let setup2Text = slPips2 > maxSlPips ? "SL TERLALU LEBAR — SKIP" : 
            "📊 XAUUSD Signal — Setup #2\n" +
            "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n" +
            "Zona Score  : ⭐⭐ CUKUP\n" +
            "Direction   : " + (bias === "BEARISH" ? "Bearish 📉" : "Bullish 📈") + "\n" +
            "Entry Zone  : $" + z2_L.toFixed(2) + " - $" + z2_H.toFixed(2) + " (" + ((z2_H - z2_L) * 10).toFixed(0) + " pip range)\n" +
            "SL          : $" + sl2.toFixed(2) + " (" + slPips2.toFixed(0) + " pip)\n" +
            "TP1         : $" + tp1_2.toFixed(2) + " (" + tp1Pips2.toFixed(0) + " pip)\n" +
            "TP2         : $" + tp2_2.toFixed(2) + " (" + tp2Pips2.toFixed(0) + " pip)\n" +
            "RR TP1      : 1:" + (tp1Pips2/slPips2).toFixed(1) + "\n" +
            "RR TP2      : 1:" + (tp2Pips2/slPips2).toFixed(1) + "\n" +
            "Rekomendasi Lot Size: " + lot2.toFixed(2) + " Lot (Risk Maks 1%)";

        let fullReport = 
            "[STEP 1 — NARASI]\n" +
            "Narasi    : Mengunci harga chart berjalan $" + currentPrice.toFixed(2) + ". Struktur otomatis memetakan area diskon.\n" +
            "Sentimen  : " + (bias === "KONFLIK" ? "Netral" : (bias === "BULLISH" ? "Risk-Off" : "Risk-On")) + "\n" +
            "Fundamental: Sinkronisasi harga berhasil. Menunggu konfirmasi data pasar.\n\n" +
            "[STEP 2 — BIAS HTF]\n" +
            "Bias Utama: " + (bias === "KONFLIK" ? "RANGING / KONFLIK" : bias) + "\n" +
            "Level Kunci HTF: $" + (currentPrice - 20).toFixed(2) + " - $" + (currentPrice + 20).toFixed(2) + "\n\n" +
            "[STEP 3 — ZONA LOGIS]\n" +
            "Zona 1: $" + z1_L.toFixed(2) + " - $" + z1_H.toFixed(2) + " | Area penting diplot pada grafik.\n\n" +
            "[STEP 4 — VALIDASI]\n" +
            "Zona 1: [" + (bias === "BULLISH" ? "⭐⭐⭐" : "⭐⭐") + "] | Sinkronisasi Chart: Berhasil\n\n" +
            "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n" + setup1Text + "\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n" +
            "[STEP 6 — CONFLICT CHECK]\n" +
            "Status      : " + (bias === "KONFLIK" ? "⚠ KONFLIK" : "✅ SELARAS") + "\n" +
            "Rekomendasi : " + (bias === "KONFLIK" ? "WAIT" : "ENTRY") + "\n\n" +
            "[VERDICT AKHIR]\n" +
            "Signal      : " + (bias === "KONFLIK" ? "🟡 WAIT" : (bias === "BULLISH" ? "🟢 STRONG BUY" : "🔴 STRONG SELL")) + "\n" +
            "Narasi Akhir: Area penting (Entry, SL, TP) sudah ditandai dengan garis putus-putus pada grafik di atas.\n\n" +
            "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n" +
            "Jaga MM 🛡 Garis area terplot otomatis pada sistem grafik\n" +
            "Your Risk Your Reward 🔥\n" +
            "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━";

        document.getElementById('terminalOutput').innerText = fullReport;
    });

    // Otomatis klik analisa di awal load halaman
    window.onload = function() {
        document.getElementById('btnCalculate').click();
    };
</script>

</body>
</html>
